<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Shark CCTV — Login</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="login-wrap">
  <img class="login-logo" src="icons/logo.png" alt="Shark CCTV" onerror="this.style.display='none'">
  <div class="login-brand">Quote Builder</div>

  <div class="login-card">
    <div class="login-title">Sign In</div>
    <div class="login-error" id="loginError"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" autocapitalize="none">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btnLogin">Sign In</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script>
  (async () => {
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.href = 'app.html';
  })();
  const btnLogin   = document.getElementById('btnLogin');
  const emailEl    = document.getElementById('loginEmail');
  const passEl     = document.getElementById('loginPassword');
  const errorEl    = document.getElementById('loginError');
  function showError(msg) { errorEl.textContent = msg; errorEl.style.display = 'block'; }
  async function doLogin() {
    const email = emailEl.value.trim(); const password = passEl.value;
    if (!email || !password) { showError('Enter your email and password.'); return; }
    btnLogin.disabled = true; btnLogin.textContent = 'Signing in…';
    errorEl.style.display = 'none';
    try { await Auth.signIn(email, password); window.location.href = 'app.html'; }
    catch (err) { showError(err.message || 'Login failed.'); btnLogin.disabled = false; btnLogin.textContent = 'Sign In'; }
  }
  btnLogin.addEventListener('click', doLogin);
  passEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script></body></html>
